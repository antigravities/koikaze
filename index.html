<html>
    <head>
        <meta charset="UTF-8">

        <title>
            Koikaze
        </title>

        <script src="index.js"></script>
        <link rel="stylesheet" href="css/greensteam/greensteam.css">
        <link rel="stylesheet" href="css/weather-icons.min.css">
        <link rel="stylesheet" href="css/koikaze.css">

        <script src="macaroni/macaroni.js"></script>
        <link rel="stylesheet" href="macaroni/macaroni.css">

        <script src="steamdiscover/steamdiscover.js"></script>
        <link rel="stylesheet" href="steamdiscover/steamdiscover.css">
    </head>
    <body>
        <div class="desktop">
            <div class="icon" name="Weather">
                <img src="icons/weather.png">
                Weather
            </div>

            <div class="icon" name="Notepad">
                <img src="icons/notepad.png">
                Notepad
            </div>

            <div class="icon" name="Call me">
                <img src="icons/phone.png">
                Call me
            </div>
        </div>

        <div class="time">
            <h1 id="time"></h1>
            <h2 id="date"></h2>
        </div>

        <div class="window half draggable closed" name="Weather">
            <h1><i class="wi" id="weather-icon"></i> <span id="weather-status"></span> &middot; <span id="weather-temperature"></span>°F</h1>

            <fieldset>
                <legend>Forecast</legend>
                <div class="forecast" id="forecast"></div>
            </fieldset>
        </div>

        <div class="window half draggable closed" name="Notepad">
            <textarea id="notepad"></textarea>
        </div>

        <div class="window half draggable closed" name="Call me">
            <h1>Topic: <span id="callme-subscribe"></span></h1>
            <div class="callme-inset inset">
                <button id="callme-call">Call</button>
                <button id="callme-reset">Reset</button>
            </div>
        </div>
    </body>
</html>
